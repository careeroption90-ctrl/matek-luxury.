<main class="max-w-2xl mx-auto py-20 px-6">
    <h2 class="text-3xl mb-10 border-b border-gray-800 pb-4">Secure Checkout</h2>
    <form action="confirmation.html" class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <input type="text" placeholder="First Name" class="bg-zinc-900 border border-gray-800 p-4 focus:border-[#D4AF37] outline-none">
            <input type="text" placeholder="Last Name" class="bg-zinc-900 border border-gray-800 p-4 focus:border-[#D4AF37] outline-none">
        </div>
        <input type="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-gray-800 p-4 focus:border-[#D4AF37] outline-none">
        <div class="pt-6 border-t border-gray-800">
            <p class="mb-4 gold-text text-sm tracking-widest">PAYMENT DETAILS</p>
            <input type="text" placeholder="Card Number" class="w-full bg-zinc-900 border border-gray-800 p-4 focus:border-[#D4AF37] outline-none mb-4">
            <div class="grid grid-cols-3 gap-4">
                <input type="text" placeholder="MM/YY" class="bg-zinc-900 border border-gray-800 p-4">
                <input type="text" placeholder="CVC" class="bg-zinc-900 border border-gray-800 p-4">
            </div>
        </div>
        <button type="submit" class="w-full gold-bg text-black py-4 font-bold mt-10">AUTHORIZE PAYMENT</button>
    </form>
</main>
